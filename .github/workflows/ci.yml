name: TurboQuant CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm ci
        run: npm ci
      - name: npm run build
        run: npm run build
      - name: TypeScript check
        run: npx tsc --noEmit 2>&1 | grep -v ".test.ts" || true

  native-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build g++
      - name: Native core build (zero warnings)
        run: |
          cd native/core && mkdir -p build && cd build && \
          cmake .. -DCMAKE_CXX_COMPILER=g++ && make -j4 2>&1 | \
          (grep -E "warning:|error:" && exit 1) || echo "ZERO WARNINGS"
      - name: Native core tests
        run: |
          cd native/core/build && ./test_tq_core 2>&1 | grep -E "PASS|FAIL|ALL TESTS"

  native-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: apt-get install cmake ninja-build
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build g++
      - name: Native kernel build (zero warnings)
        run: |
          cd native/kernel && mkdir -p build && cd build && cmake .. && make -j4 2>&1 | \
          (grep -E "warning:|error:" && exit 1) || echo "ZERO WARNINGS"
      - name: Native kernel tests
        run: |
          cd native/kernel/build && ./test_kernel 2>&1 | grep -E "PASS|FAIL"
          ./test_hadamard_qjl 2>&1 | grep -E "ALL|TESTS"
      - name: Intercept layer build
        run: |
          cd native/opencl-intercept && mkdir -p build && cd build && cmake .. && make -j4
          LD_LIBRARY_PATH=. ./test_intercept 2>&1 | grep -E "PASS|FAIL"

  spirv-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SPIR-V build
        run: |
          apt-get update -qq && apt-get install -y -qq clang llvmspirv spirvtools
          bash native/opencl/tools/compile_spirv.sh --all 2>&1 | grep -E "Done|ERROR"
          ls native/spirv/build/*.spv

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TurboQuant smoke
        run: npm install && npm run smoke:stdio 2>&1
