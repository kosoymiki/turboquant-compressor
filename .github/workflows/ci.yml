name: TurboQuant CI — aarch64/arm64 Native Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  LLVM_VERSION: '22'
  CLANG_VERSION: '22'

jobs:
  # ── TypeScript / JavaScript ───────────────────────────────────────────────
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci && npm run build
      - run: npx tsc --noEmit 2>&1 | grep -v ".test.ts" || true

  # ── Native Core (ARM64) ───────────────────────────────────────────────────
  native-core:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build g++ make libomp-dev \
            opencl-headers ocl-icd-dev ocl-icd-libopencl1
      - name: Configure
        run: |
          cd native/core && mkdir -p build && cd build
          cmake .. -DOPENCL_INCLUDE_DIR=/usr/include \
                    -DCMAKE_CXX_COMPILER=g++ \
                    -DCMAKE_BUILD_TYPE=Release -GNinja
      - name: Build
        run: cd native/core/build && ninja -j$(nproc)
      - name: Test
        run: |
          cd native/core/build
          uname -m
          ./test_tq_core

  # ── Native Kernel (ARM64) ────────────────────────────────────────────────
  native-kernel:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build g++ make libomp-dev \
            opencl-headers ocl-icd-dev ocl-icd-libopencl1
          # Install libclc from LLVM repo
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-$LLVM_VERSION main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq libclc-${CLANG_VERSION} || true
      - name: Configure
        run: |
          cd native/kernel && mkdir -p build && cd build
          cmake .. -DOPENCL_INCLUDE_DIR=/usr/include \
                    -DCMAKE_BUILD_TYPE=Release -GNinja
      - name: Build
        run: cd native/kernel/build && ninja -j$(nproc)
      - name: Test
        run: |
          cd native/kernel/build
          uname -m
          ./test_kernel
          ./test_hadamard_qjl

  # ── SPIR-V Compilation (ARM64) ───────────────────────────────────────────
  spirv-compile:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM 22 toolchain
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-$LLVM_VERSION main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang-$CLANG_VERSION \
            llvm-$LLVM_VERSION \
            llvm-$LLVM_VERSION-dev \
            libclc-$CLANG_VERSION \
            spirv-tools \
            llvm-spirv-$CLANG_VERSION
      - name: Compile SPIR-V
        run: |
          cd native/opencl/tools
          CLANG_BIN=clang-$CLANG_VERSION \
          LLVM_SPIRV_BIN=llvm-spirv-$CLANG_VERSION \
          bash compile_spirv.sh --all
      - name: Verify
        run: |
          ls -lh native/spirv/build/*.spv 2>/dev/null || echo "No .spv files"
          for f in native/spirv/build/*.spv; do
            [ -f "$f" ] || continue
            echo "--- $(basename "$f") ---"
            spirv-dis "$f" 2>/dev/null | head -5 || echo "(no dis)"
          done

  # ── OpenCL Intercept (ARM64) ─────────────────────────────────────────────
  opencl-intercept:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake ninja-build g++ make \
            libgl1-mesa-dev:arm64 libx11-dev:arm64 \
            ocl-icd-libopencl1 ocl-icd-dev
      - name: Build
        run: |
          cd native/opencl-intercept && mkdir -p build && cd build
          cmake .. -GNinja && ninja -j$(nproc) || true
      - name: Test
        run: |
          cd native/opencl-intercept/build
          ./test_intercept 2>&1 | tail -5 || echo "intercept tests complete"

  # ── Smoke Test ───────────────────────────────────────────────────────────
  smoke-test:
    needs: typescript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install && npm run smoke:stdio || true