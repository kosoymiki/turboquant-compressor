name: TurboQuant CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run build
      - run: npx tsc --noEmit 2>&1 | grep -v ".test.ts" || true

  native-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build g++
      - name: Build
        run: |
          cd native/core && mkdir -p build && cd build && \
          cmake .. -DCMAKE_CXX_COMPILER=g++ && make -j4
      - name: Test
        run: |
          cd native/core/build && ./test_tq_core

  native-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build g++
      - name: Build
        run: |
          cd native/kernel && mkdir -p build && cd build && \
          cmake .. && make -j4
      - name: Test kernel
        run: cd native/kernel/build && ./test_kernel
      - name: Test Hadamard QJL
        run: cd native/kernel/build && ./test_hadamard_qjl

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install && npm run smoke:stdio