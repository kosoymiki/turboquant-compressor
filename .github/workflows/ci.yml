name: TurboQuant CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  # LLVM 21 — Termux uses 21.1.8, CI uses apt.llvm.org/latest for newest
  LLVM_VERSION: '21'
  CLANG_VERSION: '21'

jobs:
  # ── TypeScript / JavaScript ───────────────────────────────────────────────
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci && npm run build
      - run: npx tsc --noEmit 2>&1 | grep -v ".test.ts" || true

  # ── Native Core ───────────────────────────────────────────────────────────
  native-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build g++
      - name: Build
        run: |
          cd native/core && mkdir -p build && cd build
          cmake .. -DCMAKE_CXX_COMPILER=g++ -GNinja
          ninja -j$(nproc)
      - name: Test
        run: |
          cd native/core/build
          ./test_tq_core
          ./test_full_benchmark

  # ── Native Kernel ────────────────────────────────────────────────────────
  native-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build g++ libomp-dev
      - name: Build
        run: |
          cd native/kernel && mkdir -p build && cd build
          cmake .. -GNinja && ninja -j$(nproc)
      - name: Test
        run: |
          cd native/kernel/build
          ./test_kernel
          ./test_hadamard_qjl

  # ── SPIR-V Compilation ─────────────────────────────────────────────────────
  spirv-compile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM/SPIR-V
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-$LLVM_VERSION main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang-$CLANG_VERSION \
            llvm-$LLVM_VERSION-dev \
            libclc-$CLANG_VERSION \
            spirv-tools \
            llvm-spirv-$CLANG_VERSION
      - name: Compile
        run: |
          cd native/opencl/tools
          CLANG_BIN=clang-$CLANG_VERSION LLVM_SPIRV_BIN=llvm-spirv-$CLANG_VERSION bash compile_spirv.sh --all
      - name: Results
        run: ls -la native/spirv/build/*.spv 2>/dev/null | head -10

  # ── OpenCL Intercept ─────────────────────────────────────────────────────
  opencl-intercept:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build g++ libgl1-mesa-dev libx11-dev
      - name: Build
        run: |
          cd native/opencl-intercept && mkdir -p build && cd build
          cmake .. -GNinja && ninja -j$(nproc)
      - name: Test
        run: cd native/opencl-intercept/build && ./test_intercept 2>&1 | tail -3

  # ── Smoke Test ───────────────────────────────────────────────────────────
  smoke-test:
    needs: typescript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install && npm run smoke:stdio